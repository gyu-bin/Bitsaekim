<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빛새김 — 스플래시 (iPad)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #c8c0b4;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Noto Serif KR', serif;
  padding: 40px;
}

.ipad {
  width: 600px;
  height: 858px;
  background: #f7edd8;
  border-radius: 36px;
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 10px #d4c4a0,
    0 0 0 12px #c8b890,
    0 40px 120px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.7);
  flex-shrink: 0;
}

.camera {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: 90px; height: 24px;
  background: #f0e4cc;
  border-radius: 12px;
  z-index: 20;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
}

.replay-btn {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(26,22,14,0.08);
  border: 1px solid rgba(26,22,14,0.15);
  color: #8a7a64;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.replay-btn:hover { background: rgba(26,22,14,0.14); }

.splash {
  position: absolute;
  inset: 0;
  background: #f7edd8;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.glow {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

.glow1 {
  width: 700px; height: 700px;
  top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  background: radial-gradient(circle, rgba(245,217,138,0.4) 0%, transparent 70%);
  animation: glowBreath 3s ease-in-out infinite;
}

.glow2 {
  width: 300px; height: 300px;
  top: 10%; left: 5%;
  background: radial-gradient(circle, rgba(184,147,90,0.08) 0%, transparent 70%);
  animation: glowBreath2 4s ease-in-out 1s infinite;
}

.glow3 {
  width: 260px; height: 260px;
  bottom: 15%; right: 5%;
  background: radial-gradient(circle, rgba(184,147,90,0.06) 0%, transparent 70%);
  animation: glowBreath2 4s ease-in-out 0.5s infinite;
}

@keyframes glowBreath {
  0%, 100% { opacity: 0.7; transform: translate(-50%, -55%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -55%) scale(1.1); }
}
@keyframes glowBreath2 {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.paper-lines {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  opacity: 0.35;
}
.paper-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: #c8b898;
}

.center {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 1;
}

.icon-wrap {
  opacity: 0;
  transform: scale(0.7) translateY(28px);
  animation: iconIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
  margin-bottom: 44px;
}

@keyframes iconIn {
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.icon-box {
  width: 152px; height: 152px;
  background: #ede0c8;
  border-radius: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 16px 50px rgba(26,22,14,0.15),
    0 3px 10px rgba(26,22,14,0.08),
    inset 0 1px 0 rgba(255,255,255,0.6);
  overflow: hidden;
}

.title-wrap { overflow: hidden; margin-bottom: 14px; }

.title {
  font-size: 108px;
  font-weight: 700;
  color: #1a160e;
  letter-spacing: -4px;
  line-height: 1;
  display: flex;
}

.char { display: inline-block; transform: translateY(100%); }
.char-빛 { animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.85s forwards; }
.char-새 { animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1) 1.0s forwards; }
.char-김 {
  animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1) 1.15s forwards;
  color: #b8935a;
}

@keyframes slideUp { to { transform: translateY(0); } }

.label {
  opacity: 0;
  letter-spacing: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 17px;
  color: #b8935a;
  animation: fadeIn 0.5s ease 1.4s forwards;
  margin-bottom: 24px;
}

@keyframes fadeIn { to { opacity: 0.8; } }

.line-wrap { width: 80px; height: 1px; overflow: hidden; margin-bottom: 22px; }
.line {
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, #b8935a, transparent);
  opacity: 0.5;
  transform: scaleX(0);
  transform-origin: left;
  animation: drawLine 0.6s ease 1.6s forwards;
}

@keyframes drawLine { to { transform: scaleX(1); } }

.tagline {
  font-size: 17px;
  color: #8a7a64;
  opacity: 0;
  letter-spacing: 0.5px;
  animation: fadeIn 0.6s ease 1.9s forwards;
  font-family: 'Noto Serif KR', serif;
  font-weight: 300;
}

.dots { display: flex; gap: 8px; margin-top: 68px; }
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #b8935a;
  opacity: 0;
}
.dot:nth-child(1) { animation: dotAnim 1.2s ease 2.4s infinite; }
.dot:nth-child(2) { animation: dotAnim 1.2s ease 2.55s infinite; }
.dot:nth-child(3) { animation: dotAnim 1.2s ease 2.7s infinite; }

@keyframes dotAnim {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.5; transform: scale(1); }
}

.home {
  position: absolute;
  inset: 0;
  background: #faf8f4;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 10px;
}
.home.visible { opacity: 1; pointer-events: auto; }
.home-text { font-size: 26px; font-weight: 700; color: #1a160e; font-family: 'Noto Serif KR', serif; }
.home-sub { font-size: 14px; color: #b0a090; font-family: 'DM Mono', monospace; letter-spacing: 1px; }

.splash.fadeout { animation: splashOut 0.8s ease forwards; }
@keyframes splashOut {
  0% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.04); }
}
</style>
</head>
<body>

<div class="ipad" id="ipad">
  <div class="camera"></div>

  <div class="home" id="home">
    <div style="font-size: 36px; margin-bottom: 8px;">✨</div>
    <div class="home-text">빛새김</div>
    <div class="home-sub">빛 가운데 새기는 찬양</div>
  </div>

  <div class="splash" id="splash">
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>
    <div class="glow glow3"></div>

    <div class="paper-lines">
      <div class="paper-line" style="top: 64%"></div>
      <div class="paper-line" style="top: 68%"></div>
      <div class="paper-line" style="top: 72%"></div>
      <div class="paper-line" style="top: 76%"></div>
      <div class="paper-line" style="top: 80%"></div>
    </div>

    <div class="center">
      <div class="icon-wrap">
        <div class="icon-box">
          <svg width="116" height="116" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <line x1="18" y1="72" x2="102" y2="72" stroke="#d4c4a8" stroke-width="0.8" opacity="0.6"/>
            <line x1="18" y1="84" x2="102" y2="84" stroke="#d4c4a8" stroke-width="0.8" opacity="0.6"/>
            <path d="M74 14 Q86 24 83 38 L52 90 L45 97 L48 88 L79 36 Q77 22 74 14Z" fill="#2a1e0e"/>
            <path d="M74 14 Q84 22 81 35 L73 50 Q75 36 72 26Z" fill="white" opacity="0.12"/>
            <path d="M79 36 L83 38 L52 90 L48 88Z" fill="#0e0c08" opacity="0.4"/>
            <path d="M48 88 L45 97 L54 92Z" fill="#b8935a"/>
            <path d="M47 93 Q36 100 22 105" stroke="#b8935a" stroke-width="2.8" stroke-linecap="round" fill="none" opacity="0.9"/>
            <path d="M79 36 Q94 28 87 18 Q80 28 72 36" fill="#b8935a" opacity="0.65"/>
            <path d="M75 44 Q92 38 87 26 Q79 36 70 44" fill="#b8935a" opacity="0.38"/>
            <path d="M72 52 Q88 48 85 36 Q77 44 68 52" fill="#b8935a" opacity="0.18"/>
            <circle cx="93" cy="22" r="3.5" fill="#b8935a" opacity="0.4"/>
            <circle cx="93" cy="22" r="2" fill="#b8935a" opacity="0.7"/>
          </svg>
        </div>
      </div>

      <div class="title-wrap">
        <div class="title">
          <span class="char char-빛">빛</span>
          <span class="char char-새">새</span>
          <span class="char char-김">김</span>
        </div>
      </div>

      <div class="label">BITSAEKIM</div>
      <div class="line-wrap"><div class="line"></div></div>
      <div class="tagline">빛 가운데 새기는 찬양</div>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</div>

<button class="replay-btn" onclick="replay()">↺ 다시 재생</button>

<script>
let timer;
function startSequence() {
  timer = setTimeout(() => {
    const splash = document.getElementById('splash');
    const home = document.getElementById('home');
    splash.classList.add('fadeout');
    setTimeout(() => { splash.style.display = 'none'; home.classList.add('visible'); }, 800);
  }, 3800);
}
function replay() {
  clearTimeout(timer);
  const ipad = document.getElementById('ipad');
  const splash = document.getElementById('splash');
  const home = document.getElementById('home');
  home.classList.remove('visible');
  splash.classList.remove('fadeout');
  splash.style.display = 'flex';
  const newSplash = splash.cloneNode(true);
  ipad.replaceChild(newSplash, splash);
  startSequence();
}
startSequence();
</script>
</body>
</html>
